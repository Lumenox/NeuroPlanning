<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Test Connexion Supabase</title>
    <style>
        .highlight-active { background-color: #fef08a !important; }
        .cell-input { width: 100%; border: none; background: transparent; text-align: center; }
    </style>
</head>
<body class="p-8 bg-slate-100">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">Statut Connexion : <span id="status" class="text-orange-500">Vérification...</span></h1>
        
        <div class="mb-4 flex gap-4">
            <input type="text" id="user" placeholder="Login (RN)" class="border p-1 text-sm">
            <input type="password" id="pass" placeholder="Mdp (123)" class="border p-1 text-sm">
            <button onclick="login()" class="bg-blue-600 text-white px-3 py-1 rounded">Connexion</button>
        </div>

        <table class="w-full border text-xs">
            <thead>
                <tr class="bg-slate-200" id="header-row"></tr>
            </thead>
            <tbody id="body-row"></tbody>
        </table>
    </div>

<script>
    // CONFIGURATION A REMPLIR
    const SUPABASE_URL = 'https://VOTRE_PROJET.supabase.co';
    const SUPABASE_KEY = 'VOTRE_CLE_ANON';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let auth = { role: 'viewer' };
    const columns = ['date', 'heure', 'C_Periph', 'C_Cogn', 'UNV1', 'Garde', 'BOX1'];

    async function init() {
        const { data, error } = await _supabase.from('planning_test').select('*');
        
        if (error) {
            document.getElementById('status').innerText = "Erreur : " + error.message;
            document.getElementById('status').className = "text-red-600";
            console.error(error);
        } else {
            document.getElementById('status').innerText = "Connecté !";
            document.getElementById('status').className = "text-green-600";
            displayData(data);
        }
    }

    function displayData(data) {
        const header = document.getElementById('header-row');
        const body = document.getElementById('body-row');
        
        header.innerHTML = columns.map(c => `<th class="border p-2">${c}</th>`).join('');
        
        body.innerHTML = data.map(row => `
            <tr>
                ${columns.map(col => {
                    const val = row[col] || "";
                    const isReadOnly = (col === 'date' || col === 'heure' || auth.role === 'viewer');
                    return `
                        <td class="border p-0">
                            <input class="cell-input" value="${val}" 
                                   ${isReadOnly ? 'disabled' : ''} 
                                   onchange="updateCell('${row.id}', '${col}', this.value)">
                        </td>`;
                }).join('')}
            </tr>
        `).join('');
    }

    async function updateCell(id, column, value) {
        const { error } = await _supabase.from('planning_test').update({ [column]: value }).eq('id', id);
        if (error) alert("Erreur de sauvegarde");
    }

    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'RN' && p === '123') auth.role = 'admin-full';
        init(); // On recharge pour débloquer les inputs
    }

    init();
</script>
</body>
</html>
