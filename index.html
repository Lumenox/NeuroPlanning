<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Neurologie</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       VARIABLES & RESET
    ============================================= */
    :root {
      --navy:       #0d1b2a;
      --navy-mid:   #1a2d42;
      --navy-light: #243d55;
      --teal:       #2dd4bf;
      --teal-dim:   #14b8a620;
      --red:        #f87171;
      --red-dim:    #f8717120;
      --amber:      #fbbf24;
      --amber-dim:  #fbbf2420;
      --white:      #f0f4f8;
      --gray:       #8fa3b5;
      --border:     #1e3148;
      --cell-h:     36px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--navy);
      color: var(--white);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* =============================================
       TOPBAR
    ============================================= */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }

    #topbar .brand {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--teal);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    #topbar .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gray);
      transition: background 0.3s;
    }
    #status-dot.connected { background: var(--teal); box-shadow: 0 0 6px var(--teal); }
    #status-dot.error     { background: var(--red); }

    #realtime-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--teal);
      background: var(--teal-dim);
      border: 1px solid var(--teal);
      border-radius: 4px;
      padding: 2px 6px;
      display: none;
    }
    #realtime-badge.active { display: inline; }

    /* =============================================
       AUTH OVERLAY
    ============================================= */
    #auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 27, 42, 0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .auth-box {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .auth-box h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--teal);
      font-family: 'DM Mono', monospace;
    }

    .auth-box p { font-size: 12px; color: var(--gray); line-height: 1.6; }

    .auth-box .hint {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--amber);
      background: var(--amber-dim);
      border-radius: 6px;
      padding: 8px 12px;
    }

    /* =============================================
       INPUTS & BUTTONS
    ============================================= */
    input[type="text"], input[type="password"], select {
      background: var(--navy);
      border: 1px solid var(--border);
      color: var(--white);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--teal); }

    button {
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover  { opacity: 0.85; }
    button:active { transform: scale(0.97); }

    .btn-primary { background: var(--teal);  color: var(--navy); }
    .btn-ghost   { background: transparent; color: var(--gray); border: 1px solid var(--border); }
    .btn-danger  { background: var(--red);   color: var(--navy); }
    .btn-save    { background: var(--amber); color: var(--navy); }

    /* =============================================
       TOOLBAR
    ============================================= */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar label {
      font-size: 11px;
      color: var(--gray);
      white-space: nowrap;
    }

    #toolbar input[type="date"] {
      background: var(--navy);
      border: 1px solid var(--border);
      color: var(--white);
      padding: 6px 10px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }

    #search-doctor { flex: 1; min-width: 120px; max-width: 200px; }

    .sep { width: 1px; height: 24px; background: var(--border); }

    /* Admin badge */
    #admin-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--amber);
      background: var(--amber-dim);
      border: 1px solid var(--amber);
      border-radius: 4px;
      padding: 3px 8px;
      display: none;
    }
    .is-admin #admin-badge { display: inline; }

    /* ---- Group toggles ---- */
    #col-toggles {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
    }

    /*
      Chaque toggle de groupe est un label stylisé comme un badge.
      La checkbox native est masquée ; l'apparence change selon :checked.
    */
    .group-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      opacity: 0.45;           /* grisé par défaut = désactivé visuellement */
    }
    .group-toggle input { display: none; }
    .group-toggle.active { opacity: 1; }

    .group-toggle .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* =============================================
       MAIN LAYOUT
    ============================================= */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* =============================================
       STATS PANEL
    ============================================= */
    #stats-panel {
      width: 230px;
      background: var(--navy-mid);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.25s ease;
    }

    #stats-panel.collapsed { width: 38px; }

    #stats-panel .panel-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 10px 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      white-space: nowrap;
      overflow: hidden;
    }

    /* Cache le texte quand réduit */
    #stats-panel.collapsed .panel-title span { visibility: hidden; }

    #stats-toggle-btn {
      background: none;
      border: none;
      color: var(--teal);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    #stats-toggle-btn:hover { opacity: 0.7; }

    #stats-content {
      overflow: hidden;
      transition: opacity 0.2s ease;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    #stats-panel.collapsed #stats-content { opacity: 0; pointer-events: none; }

    #stats-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      transition: background 0.15s;
      cursor: pointer;
      min-width: 0;
    }
    .stat-row:hover { background: var(--navy-light); }
    .stat-row.active-filter { background: var(--teal-dim); }

    .stat-name {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--white);
      min-width: 30px;
    }

    .stat-badges {
      flex: 1;
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .stat-badge {
      font-size: 9px;
      background: var(--navy-light);
      border-radius: 3px;
      padding: 1px 5px;
      white-space: nowrap;
    }

    .stat-total {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--teal);
      min-width: 20px;
      text-align: right;
    }

    #conflict-summary {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--gray);
      flex-shrink: 0;
    }
    #conflict-summary .conf-count {
      color: var(--red);
      font-weight: 600;
      font-family: 'DM Mono', monospace;
    }

    /* =============================================
       TABLE
    ============================================= */
    #table-wrap { flex: 1; overflow: auto; position: relative; }

    table {
      border-collapse: collapse;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      min-width: 100%;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--navy-light);
      padding: 10px 8px;
      text-align: left;
      font-size: 10px;
      font-weight: 500;
      color: var(--gray);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }

    .col-group {
      background: var(--navy) !important;
      font-size: 9px !important;
      color: var(--teal) !important;
      border-bottom: 1px solid var(--border) !important;
      text-align: center !important;
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--navy-light); }
    tr.creno-matin { background: rgba(255,255,255,0.01); }
    tr.creno-aprem { background: rgba(0,0,0,0.15); }
    tr.creno-aprem:hover { background: var(--navy-light); }

    tr.conflict {
      background: var(--red-dim) !important;
      border-left: 3px solid var(--red);
    }

    td.doctor-highlight { background: var(--teal-dim); color: var(--teal) !important; font-weight: 500; }

    td {
      padding: 6px 8px;
      height: var(--cell-h);
      white-space: nowrap;
      color: var(--white);
      min-width: 50px;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    td.col-date {
      color: var(--gray);
      font-size: 10px;
      position: sticky;
      left: 0;
      background: var(--navy-mid);
      z-index: 2;
      min-width: 90px;
      border-right: 1px solid var(--border);
    }
    tr:hover td.col-date { background: var(--navy-light); }

    td.col-heure { color: var(--teal); font-size: 11px; font-weight: 500; }

    .is-admin td.editable {
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: 3px;
      transition: border-color 0.15s;
    }
    .is-admin td.editable:hover { border-color: var(--amber); background: var(--amber-dim); }

    td.editing { padding: 2px !important; }
    td.editing input {
      width: 100%; height: 100%;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: var(--navy);
      color: var(--white);
      border: 1px solid var(--amber);
      border-radius: 3px;
      padding: 0 4px;
      outline: none;
    }

    /* =============================================
       LOADING & TOASTS
    ============================================= */
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; background: var(--navy); z-index: 5;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 12px; color: var(--gray); }

    #empty-state { padding: 60px; text-align: center; color: var(--gray); font-size: 13px; display: none; }

    #toast-container {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px; z-index: 200;
    }
    .toast {
      font-family: 'DM Mono', monospace; font-size: 11px;
      padding: 10px 16px; border-radius: 8px;
      border-left: 3px solid var(--teal);
      background: var(--navy-mid); color: var(--white);
      animation: slideIn 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .toast.error   { border-color: var(--red); }
    .toast.warning { border-color: var(--amber); }
    @keyframes slideIn {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
  </style>
</head>
<body>

<!-- ======================================================
     AUTH OVERLAY
====================================================== -->
<div id="auth-overlay">
  <div class="auth-box">
    <h2>Neurologie · Planning</h2>
    <p>Entrez vos identifiants pour accéder au planning.</p>
    <div class="hint">
      👨‍⚕️ Admin → login: <strong>admin</strong> / mdp: <strong>neuro2026</strong><br>
      👁️ Viewer → login: <strong>rn</strong> / mdp: <strong>123</strong>
    </div>
    <input type="text"     id="auth-login" placeholder="Login" autocomplete="off" />
    <input type="password" id="auth-pass"  placeholder="Mot de passe" />
    <div id="auth-error" style="color:var(--red);font-size:11px;display:none;">Identifiants incorrects.</div>
    <button class="btn-primary" onclick="doLogin()">Connexion</button>
  </div>
</div>


<!-- ======================================================
     TOPBAR
====================================================== -->
<div id="topbar">
  <span class="brand">🧠 Planning Neurologie</span>
  <div class="controls">
    <div id="status-dot" title="Connexion Supabase"></div>
    <span id="realtime-badge">● LIVE</span>
    <span id="admin-badge">ADMIN</span>
    <div class="sep"></div>
    <button id="btn-toggle-edit" class="btn-ghost" style="display:none" onclick="toggleEditMode()">✏️ Modifier</button>
    <button id="btn-save-all"    class="btn-save"  style="display:none" onclick="saveAllPending()">💾 Sauvegarder</button>
    <div class="sep"></div>
    <button class="btn-ghost" onclick="loadData()" title="Rafraîchir">↺</button>
    <button class="btn-ghost" style="font-size:11px" onclick="logout()">Déconnexion</button>
  </div>
</div>


<!-- ======================================================
     TOOLBAR
     ⚠️  Ne pas oublier de fermer ce </div> en bas !
====================================================== -->
<div id="toolbar">

  <label>Du</label>
  <input type="date" id="filter-date-from" onchange="applyFilters()" />
  <label>Au</label>
  <input type="date" id="filter-date-to"   onchange="applyFilters()" />

  <input type="text" id="search-doctor" placeholder="🔍 Chercher un médecin…" oninput="applyFilters()" />

  <div class="sep"></div>

  <!-- Toggles par GROUPE (généré dynamiquement dans buildColToggles()) -->
  <label style="font-size:11px; color:var(--teal)">Afficher :</label>
  <div id="col-toggles"></div>

  <div class="sep"></div>

  <button class="btn-ghost" onclick="clearFilters()" style="font-size:11px">✕ Réinitialiser</button>

</div>  <!-- ← BUG CORRIGÉ : ce </div> fermait #toolbar et manquait dans ta version -->


<!-- ======================================================
     MAIN CONTENT
====================================================== -->
<div id="main">

  <!-- TABLE -->
  <div id="table-wrap">
    <div id="loading">
      <div class="spinner"></div>
      <p>Connexion à Supabase…</p>
    </div>
    <div id="empty-state">Aucune ligne ne correspond aux filtres.</div>
    <table id="planning-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <!-- STATS PANEL -->
  <div id="stats-panel">
    <div class="panel-title">
      <span>Compteurs</span>
      <!-- La flèche › / ‹ bascule le panneau -->
      <button id="stats-toggle-btn" onclick="toggleStatsPanel()">›</button>
    </div>
    <div id="stats-content">
      <div id="stats-list"></div>
      <div id="conflict-summary">
        Conflits : <span class="conf-count" id="conflict-count">0</span>
      </div>
    </div>
  </div>

</div>

<div id="toast-container"></div>


<script>
/* ============================================================
   CONFIGURATION SUPABASE — remplacez par vos vraies clés
============================================================ */
const SUPABASE_URL = 'https://yseaujinbdwxpcelsywr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7uC727-tO92zxGsAwCqBnA_E9oX_Xw8';
const _supabase    = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


/* ============================================================
   UTILISATEURS (prototype — à remplacer par une table Supabase)
============================================================ */
const USERS = {
  admin: { pass: 'neuro2026', role: 'admin'  },
  rn:    { pass: '123',       role: 'viewer' },
};


/* ============================================================
   DÉFINITION DES COLONNES
   group : regroupe les colonnes pour les toggles et les stats
   Ajoutez ici toutes les colonnes de votre table Supabase.
============================================================ */
const COLUMNS = [
  { key: 'date',     label: 'Date',     group: 'meta'  },
  { key: 'heure',    label: 'Heure',    group: 'meta'  },
  { key: 'C_Periph', label: 'C.Périph', group: 'coord' },
  { key: 'C_Cogn',   label: 'C.Cogn',  group: 'coord' },
  { key: 'C_sup',    label: 'C.Sup',   group: 'coord' },
  { key: 'UNV1',     label: 'UNV 1',   group: 'unv'   },
  { key: 'UNV2',     label: 'UNV 2',   group: 'unv'   },
  { key: 'USI1',     label: 'USI 1',   group: 'usi'   },
  { key: 'USI2',     label: 'USI 2',   group: 'usi'   },
  { key: 'BIPv',     label: 'BIP v',   group: 'bip'   },
  { key: 'BIPng',    label: 'BIP ng',  group: 'bip'   },
  { key: 'Garde',    label: 'Garde',   group: 'garde' },
  { key: 'BOX1',     label: 'BOX 1',   group: 'box'   },
  { key: 'BOX2',     label: 'BOX 2',   group: 'box'   },
];

/* Libellés affichés sur les badges de toggle */
const GROUP_LABELS = {
  coord: 'Coord',
  unv:   'UNV',
  usi:   'USI',
  bip:   'BIP',
  garde: 'Garde',
  box:   'BOX',
};

/* Couleurs par groupe (utilisées dans les badges et les en-têtes) */
const GROUP_COLORS = {
  coord: '#60a5fa',
  unv:   '#34d399',
  usi:   '#f472b6',
  bip:   '#a78bfa',
  garde: '#fbbf24',
  box:   '#94a3b8',
};

/*
  groupMap : { groupName: [colKey, colKey, ...] }
  Construit automatiquement depuis COLUMNS — vous n'avez rien à changer ici
  quand vous ajoutez des colonnes ci-dessus.
*/
const groupMap = {};
COLUMNS.filter(c => c.group !== 'meta').forEach(col => {
  if (!groupMap[col.group]) groupMap[col.group] = [];
  groupMap[col.group].push(col.key);
});

/* Colonnes médicales (tout sauf date/heure) */
const DOCTOR_COLS = COLUMNS.filter(c => c.group !== 'meta').map(c => c.key);

/*
  visibleCols : { colKey: boolean }
  État courant de visibilité de chaque colonne.
  Initialement toutes visibles.
*/
const visibleCols = {};
COLUMNS.forEach(col => { visibleCols[col.key] = true; });


/* ============================================================
   STATE GLOBAL
============================================================ */
let currentUser         = null;
let allData             = [];
let currentFilteredRows = [];   // lignes après filtres, utilisées par buildStats()
let pendingEdits        = {};
let isEditMode          = false;
let realtimeSub         = null;
let doctorFilter        = null;


/* ============================================================
   AUTHENTIFICATION
============================================================ */
function doLogin() {
  const login = document.getElementById('auth-login').value.trim().toLowerCase();
  const pass  = document.getElementById('auth-pass').value;
  const user  = USERS[login];

  if (!user || user.pass !== pass) {
    document.getElementById('auth-error').style.display = 'block';
    return;
  }

  currentUser = { login, role: user.role };
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('auth-error').style.display   = 'none';

  if (user.role === 'admin') {
    document.getElementById('btn-toggle-edit').style.display = 'inline';
    document.body.classList.add('is-admin');
  }

  init();
}

document.getElementById('auth-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function logout() {
  if (realtimeSub) _supabase.removeChannel(realtimeSub);
  currentUser  = null;
  isEditMode   = false;
  pendingEdits = {};
  allData      = [];
  document.body.classList.remove('is-admin');
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('auth-login').value = '';
  document.getElementById('auth-pass').value  = '';
  document.getElementById('status-dot').className = '';
  document.getElementById('realtime-badge').classList.remove('active');
}


/* ============================================================
   INITIALISATION
============================================================ */
async function init() {
  buildTableHeader();
  buildColToggles();   // ← génère les badges de groupe dans la toolbar
  await loadData();
  subscribeRealtime();
}


/* ============================================================
   TOGGLES DE GROUPES DE COLONNES
   Génère un badge-bouton par groupe dans #col-toggles.
   Cocher/décocher un groupe masque/affiche toutes ses colonnes.
============================================================ */
function buildColToggles() {
  const container = document.getElementById('col-toggles');
  container.innerHTML = '';

  Object.keys(groupMap).forEach(group => {
    const label = document.createElement('label');
    label.className = 'group-toggle active';  // actif par défaut
    label.style.color = GROUP_COLORS[group] || 'var(--white)';
    label.style.borderColor = GROUP_COLORS[group] || 'var(--border)';

    const cb = document.createElement('input');
    cb.type    = 'checkbox';
    cb.checked = true;

    cb.addEventListener('change', () => {
      // Met à jour visibleCols pour toutes les colonnes du groupe
      groupMap[group].forEach(key => { visibleCols[key] = cb.checked; });
      label.classList.toggle('active', cb.checked);
      applyColVisibility();
    });

    const dot = document.createElement('span');
    dot.className = 'dot';

    label.appendChild(cb);
    label.appendChild(dot);
    label.appendChild(document.createTextNode(GROUP_LABELS[group] || group));
    container.appendChild(label);
  });
}

/*
  Masque ou affiche les cellules selon visibleCols.
  Utilise data-col (mis sur chaque th et td) pour cibler précisément
  sans se tromper avec nth-child sur des en-têtes fusionnés.
*/
function applyColVisibility() {
  COLUMNS.forEach(col => {
    if (col.group === 'meta') return; // date et heure toujours visibles
    const show = visibleCols[col.key] ? '' : 'none';
    document.querySelectorAll(`[data-col="${col.key}"]`).forEach(cell => {
      cell.style.display = show;
    });
  });
  buildStats();
}


/* ============================================================
   PANNEAU STATS — rétractable
============================================================ */
function toggleStatsPanel() {
  const panel = document.getElementById('stats-panel');
  const btn   = document.getElementById('stats-toggle-btn');
  const isCollapsed = panel.classList.toggle('collapsed');
  btn.textContent = isCollapsed ? '‹' : '›';
}


/* ============================================================
   CHARGEMENT DES DONNÉES
============================================================ */
async function loadData() {
  showLoading(true);

  const { data, error } = await _supabase
    .from('planning')
    .select('*')
    .order('date',  { ascending: true })
    .order('heure', { ascending: true });

  if (error) {
    showLoading(false);
    setStatus('error');
    toast('Erreur : ' + error.message, 'error');
    return;
  }

  allData = data || [];
  setStatus('connected');
  showLoading(false);
  applyFilters();
  buildStats();
}


/* ============================================================
   SUPABASE REALTIME
============================================================ */
function subscribeRealtime() {
  realtimeSub = _supabase
    .channel('planning-live')
    .on('postgres_changes',
        { event: '*', schema: 'public', table: 'planning' },
        (payload) => {
          if (payload.eventType === 'UPDATE') {
            const idx = allData.findIndex(r => r.id === payload.new.id);
            if (idx >= 0) allData[idx] = payload.new; else allData.push(payload.new);
          } else if (payload.eventType === 'INSERT') {
            allData.push(payload.new);
            allData.sort((a, b) => a.date.localeCompare(b.date) || a.heure.localeCompare(b.heure));
          } else if (payload.eventType === 'DELETE') {
            allData = allData.filter(r => r.id !== payload.old.id);
          }
          applyFilters();
          buildStats();
          toast('Planning mis à jour en temps réel');
        })
    .subscribe(status => {
      if (status === 'SUBSCRIBED')
        document.getElementById('realtime-badge').classList.add('active');
    });
}


/* ============================================================
   FILTRES
============================================================ */
function applyFilters() {
  const dateFrom  = document.getElementById('filter-date-from').value;
  const dateTo    = document.getElementById('filter-date-to').value;
  const docSearch = document.getElementById('search-doctor').value.trim().toLowerCase();

  currentFilteredRows = allData.filter(row => {
    if (dateFrom && row.date < dateFrom) return false;
    if (dateTo   && row.date > dateTo)   return false;

    if (docSearch) {
      const found = DOCTOR_COLS.some(col => (row[col] || '').toLowerCase().includes(docSearch));
      if (!found) return false;
    }

    if (doctorFilter) {
      const found = DOCTOR_COLS.some(col =>
        (row[col] || '').trim().toUpperCase() === doctorFilter.toUpperCase()
      );
      if (!found) return false;
    }

    return true;
  });

  renderTable(currentFilteredRows, docSearch || doctorFilter);
  applyColVisibility();  // réappliquer la visibilité après chaque re-rendu
  buildStats();
}

/*
  BUG CORRIGÉ : clearFilters() ne référence plus filter-heure (supprimé)
*/
function clearFilters() {
  document.getElementById('filter-date-from').value = '';
  document.getElementById('filter-date-to').value   = '';
  document.getElementById('search-doctor').value    = '';
  doctorFilter = null;
  document.querySelectorAll('.stat-row').forEach(r => r.classList.remove('active-filter'));
  applyFilters();
}


/* ============================================================
   CONSTRUCTION DU HEADER
   Ajoute data-col sur chaque th de la ligne des noms de colonnes
   (pas sur la ligne des groupes qui a des colspans).
============================================================ */
function buildTableHeader() {
  const thead = document.getElementById('table-head');
  thead.innerHTML = '';

  /* Ligne 1 : groupes fusionnés */
  const groupRow = document.createElement('tr');
  let prevGroup = null, span = 0;
  const thList  = [];

  COLUMNS.forEach(col => {
    if (col.group !== prevGroup) {
      if (prevGroup !== null) thList.push({ group: prevGroup, span });
      prevGroup = col.group;
      span = 1;
    } else {
      span++;
    }
  });
  thList.push({ group: prevGroup, span });

  const groupLabelMap = { meta: '', coord: 'Coordination', unv: 'UNV', usi: 'USI', bip: 'BIP', garde: 'Gardes', box: 'BOX' };
  thList.forEach(({ group, span }) => {
    const th = document.createElement('th');
    th.colSpan   = span;
    th.className = 'col-group';
    th.textContent = groupLabelMap[group] || group;
    if (GROUP_COLORS[group]) th.style.color = GROUP_COLORS[group];
    groupRow.appendChild(th);
  });

  /* Ligne 2 : noms de colonnes — avec data-col pour ciblage CSS */
  const colRow = document.createElement('tr');
  COLUMNS.forEach(col => {
    const th = document.createElement('th');
    th.textContent    = col.label;
    th.dataset.col    = col.key;   // ← utilisé par applyColVisibility()
    if (GROUP_COLORS[col.group]) th.style.color = GROUP_COLORS[col.group];
    colRow.appendChild(th);
  });

  thead.appendChild(groupRow);
  thead.appendChild(colRow);
}


/* ============================================================
   RENDU DU TABLEAU
============================================================ */
function renderTable(rows, highlightDoctor) {
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  tbody.innerHTML = '';

  if (rows.length === 0) {
    empty.style.display = 'block';
    document.getElementById('conflict-count').textContent = '0';
    return;
  }
  empty.style.display = 'none';

  let conflictCount = 0;

  rows.forEach(row => {
    const tr = document.createElement('tr');

    /* Détection conflits : même initiales sur 2+ colonnes de la même ligne */
    const doctorPositions = {};
    DOCTOR_COLS.forEach(col => {
      const val = (row[col] || '').trim().toUpperCase();
      if (val && val.length > 0 && val.length <= 6) {
        if (!doctorPositions[val]) doctorPositions[val] = [];
        doctorPositions[val].push(col);
      }
    });

    const conflictingDoctors = Object.entries(doctorPositions)
      .filter(([, cols]) => cols.length > 1)
      .map(([doc]) => doc);

    if (conflictingDoctors.length > 0) {
      tr.classList.add('conflict');
      conflictCount++;
      tr.title = '⚠️ Conflit : ' + conflictingDoctors.join(', ') + ' présent(s) sur plusieurs postes';
    }

    tr.classList.add(row.heure === '9h00' ? 'creno-matin' : 'creno-aprem');

    COLUMNS.forEach(col => {
      const td  = document.createElement('td');
      const val = row[col.key] || '';

      td.dataset.col = col.key;   // ← sur TOUTES les cellules pour applyColVisibility()

      if (col.key === 'date') {
        td.className   = 'col-date';
        td.textContent = formatDate(val);

      } else if (col.key === 'heure') {
        td.className   = 'col-heure';
        td.textContent = val;

      } else {
        const isConflictCell = conflictingDoctors.includes(val.trim().toUpperCase());
        const isHighlighted  = highlightDoctor &&
          val.trim().toLowerCase().includes(highlightDoctor.toLowerCase());

        td.className = 'editable';
        if (isConflictCell) td.style.color = 'var(--red)';
        if (isHighlighted)  td.classList.add('doctor-highlight');

        const pending = pendingEdits[row.id]?.[col.key];
        td.textContent = pending !== undefined ? pending : val;
        if (pending !== undefined) td.style.borderColor = 'var(--amber)';

        if (currentUser?.role === 'admin' && isEditMode) {
          td.addEventListener('dblclick', () => startEdit(td, row, col.key));
        }
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  document.getElementById('conflict-count').textContent = conflictCount;
}


/* ============================================================
   ÉDITION ADMIN
============================================================ */
function toggleEditMode() {
  isEditMode = !isEditMode;
  const btn    = document.getElementById('btn-toggle-edit');
  const savBtn = document.getElementById('btn-save-all');

  if (isEditMode) {
    btn.textContent    = '🔒 Lecture seule';
    btn.className      = 'btn-danger';
    savBtn.style.display = 'inline';
    toast('Mode édition activé — double-cliquez sur une cellule', 'warning');
  } else {
    btn.textContent    = '✏️ Modifier';
    btn.className      = 'btn-ghost';
    savBtn.style.display = 'none';
    pendingEdits = {};
    applyFilters();
  }
}

function startEdit(td, row, colKey) {
  if (td.classList.contains('editing')) return;
  td.classList.add('editing');

  const oldVal = td.textContent;
  const input  = document.createElement('input');
  input.type   = 'text';
  input.value  = oldVal;
  td.textContent = '';
  td.appendChild(input);
  input.focus();
  input.select();

  const commit = () => {
    const newVal = input.value.trim();
    td.classList.remove('editing');
    td.textContent = newVal;

    if (newVal !== oldVal) {
      if (!pendingEdits[row.id]) pendingEdits[row.id] = {};
      pendingEdits[row.id][colKey] = newVal;
      td.style.borderColor = 'var(--amber)';
    }
    checkConflictsAfterEdit(row, colKey, newVal);
  };

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = oldVal; input.blur(); }
  });
}

function checkConflictsAfterEdit(row, editedCol, newVal) {
  if (!newVal || newVal.length > 6) return;
  const vals  = DOCTOR_COLS.map(col =>
    (col === editedCol ? newVal : (pendingEdits[row.id]?.[col] ?? row[col] ?? ''))
      .trim().toUpperCase()
  );
  const upper = newVal.trim().toUpperCase();
  const count = vals.filter(v => v === upper).length;
  if (count > 1) toast(`⚠️ Conflit : ${newVal} apparaît ${count} fois sur cette ligne !`, 'warning');
}

async function saveAllPending() {
  const ids = Object.keys(pendingEdits);
  if (ids.length === 0) { toast('Aucune modification à sauvegarder.'); return; }

  let ok = 0;
  for (const id of ids) {
    const { error } = await _supabase.from('planning').update(pendingEdits[id]).eq('id', id);
    if (error) {
      toast(`Erreur ligne ${id} : ` + error.message, 'error');
    } else {
      const row = allData.find(r => r.id === parseInt(id));
      if (row) Object.assign(row, pendingEdits[id]);
      ok++;
    }
  }

  pendingEdits = {};
  applyFilters();
  buildStats();
  if (ok > 0) toast(`✅ ${ok} ligne(s) sauvegardée(s)`);
}


/* ============================================================
   STATISTIQUES
   Compte par groupe de colonnes, sur les lignes filtrées et
   les colonnes actuellement visibles uniquement.
============================================================ */
function buildStats() {
  /*
    allCounts : { 'BL': { UNV: 2, Garde: 1 }, 'TG': { USI: 3 }, ... }
    On ne compte que les colonnes dont le groupe est visible.
  */
  const allCounts = {};

  Object.entries(groupMap).forEach(([groupName, cols]) => {
    const activeCols = cols.filter(c => visibleCols[c]);
    currentFilteredRows.forEach(row => {
      activeCols.forEach(col => {
        const val = (row[col] || '').trim();
        // On ne compte que les initiales courtes (pas "REUNION DE GARDE" etc.)
        if (val && val.length <= 5 && /^[A-Za-zÀ-ÿ]+$/.test(val.replace(/\s/, ''))) {
          const key = val.toUpperCase();
          if (!allCounts[key]) allCounts[key] = {};
          allCounts[key][GROUP_LABELS[groupName] || groupName] =
            (allCounts[key][GROUP_LABELS[groupName] || groupName] || 0) + 1;
        }
      });
    });
  });

  const list = document.getElementById('stats-list');
  list.innerHTML = '';

  /* Tri par total décroissant */
  Object.entries(allCounts)
    .sort((a, b) => {
      const tA = Object.values(a[1]).reduce((s, v) => s + v, 0);
      const tB = Object.values(b[1]).reduce((s, v) => s + v, 0);
      return tB - tA;
    })
    .forEach(([doc, groupCounts]) => {
      const div   = document.createElement('div');
      div.className = 'stat-row';
      if (doctorFilter === doc) div.classList.add('active-filter');

      const total = Object.values(groupCounts).reduce((s, v) => s + v, 0);

      /* Badges colorés par groupe */
      const badgesHtml = Object.entries(groupCounts).map(([g, n]) => {
        // Retrouver la couleur du groupe depuis son label
        const groupKey = Object.entries(GROUP_LABELS).find(([, lbl]) => lbl === g)?.[0];
        const color    = GROUP_COLORS[groupKey] || 'var(--gray)';
        return `<span class="stat-badge" style="color:${color}">${g}:${n}</span>`;
      }).join('');

      div.innerHTML = `
        <span class="stat-name">${doc}</span>
        <div class="stat-badges">${badgesHtml}</div>
        <span class="stat-total">${total}</span>
      `;

      div.addEventListener('click', () => {
        doctorFilter = (doctorFilter === doc) ? null : doc;
        applyFilters();
      });

      list.appendChild(div);
    });
}


/* ============================================================
   HELPERS
============================================================ */
function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d     = new Date(dateStr + 'T00:00:00');
    const jours = ['dim.', 'lun.', 'mar.', 'mer.', 'jeu.', 'ven.', 'sam.'];
    return `${jours[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  } catch { return dateStr; }
}

function showLoading(visible) {
  document.getElementById('loading').style.display = visible ? 'flex' : 'none';
}

function setStatus(state) {
  document.getElementById('status-dot').className = state;
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className   = 'toast' + (type !== 'info' ? ` ${type}` : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
