<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Test Connexion Supabase</title>
    <style>
        .highlight-active { background-color: #fef08a !important; }
        .cell-input { width: 100%; border: none; background: transparent; text-align: center; }
    </style>
</head>
<body class="p-8 bg-slate-100">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">Statut Connexion : <span id="status" class="text-orange-500">Vérification...</span></h1>
        
        <div class="mb-4 flex gap-4">
            <input type="text" id="user" placeholder="Login (RN)" class="border p-1 text-sm">
            <input type="password" id="pass" placeholder="Mdp (123)" class="border p-1 text-sm">
            <button onclick="login()" class="bg-blue-600 text-white px-3 py-1 rounded">Connexion</button>
        </div>

        <table class="w-full border text-xs">
            <thead>
                <tr class="bg-slate-200" id="header-row"></tr>
            </thead>
            <tbody id="body-row"></tbody>
        </table>
    </div>

<script>
    // CONFIGURATION A REMPLIR
    const SUPABASE_URL = 'https://yseaujinbdwxpcelsywr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7uC727-tO92zxGsAwCqBnA_E9oX_Xw8';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let auth = { role: 'viewer' };

    async function init() {
        // On récupère tout de la table 'planning'
        const { data, error } = await _supabase.from('planning').select('*').limit(10);
        
        if (error) {
            document.getElementById('status').innerText = "Erreur : " + error.message;
            document.getElementById('status').className = "text-red-600";
        } else if (data.length === 0) {
            document.getElementById('status').innerText = "Connecté mais TABLE VIDE";
            document.getElementById('status').className = "text-orange-500";
        } else {
            document.getElementById('status').innerText = "Connecté ! (" + data.length + " lignes)";
            document.getElementById('status').className = "text-green-600";
            
            // DEBUG : Affiche les données réelles dans la console (F12)
            console.log("Colonnes détectées :", Object.keys(data[0]));
            console.table(data); 

            displayData(data);
        }
    }

    function displayData(data) {
        const header = document.getElementById('header-row');
        const body = document.getElementById('body-row');
        
        // On prend les noms de colonnes RÉELS de Supabase au lieu de les deviner
        const realColumns = Object.keys(data[0]);
        
        header.innerHTML = realColumns.map(c => `<th class="border p-2 bg-slate-200">${c}</th>`).join('');
        
        body.innerHTML = data.map(row => `
            <tr>
                ${realColumns.map(col => {
                    const val = row[col] || "";
                    return `<td class="border p-1 text-center font-bold">${val}</td>`;
                }).join('')}
            </tr>
        `).join('');
    }

    init();
</script>
