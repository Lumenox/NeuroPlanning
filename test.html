<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // --- CONFIGURATION ---
    // Remplacez par vos vraies clés trouvées dans Supabase (Settings > API)
    const SUPABASE_URL = 'https://yseaujinbdwxpcelsywr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7uC727-tO92zxGsAwCqBnA_E9oX_Xw8';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let fullData = [];
    let auth = { user: '', role: 'viewer', pwd: '' };

    // --- LOGIQUE DE CHARGEMENT ---
    async function loadPlanning() {
        // On récupère les données de la table 'planning' (votre CSV importé)
        const { data, error } = await _supabase
            .from('planning')
            .select('*')
            .order('id', { ascending: true }); // Supabase crée souvent une colonne ID à l'import

        if (error) {
            console.error("Erreur Supabase:", error);
            alert("Impossible de charger les données.");
        } else {
            fullData = data;
            renderTable();
        }
    }

    // --- LOGIQUE D'AFFICHAGE ---
    function renderTable() {
        const monthFilter = document.getElementById('monthFilter').value;
        const highlight = document.getElementById('highlightDoc').value;
        const body = document.getElementById('body-grid');
        
        // On définit les colonnes à afficher basées sur votre CSV
        const columns = [
            'date', 'heure', 
            'C Periph', 'C Cogn', 'C sup', 'C Int1', 'C Int2', 
            'UNV1', 'UNV2', 'USI1', 'USI2', 
            'BIPv', 'BIPng', 'Garde', 
            'BOX1', 'BOX2', 'BOX3', 'BOX4'
        ];

        // Filtrage des données par mois (format JJ/MM/AAAA)
        const filteredData = fullData.filter(row => {
            if(!row.date) return false;
            return row.date.includes('/' + monthFilter + '/');
        });

        let html = "";
        filteredData.forEach(row => {
            html += `<tr class="border-b hover:bg-slate-50 transition-colors">`;
            
            columns.forEach(col => {
                const val = row[col] || "";
                const isFixed = (col === 'date' || col === 'heure');
                const isHighlighted = (highlight && val === highlight) ? 'highlight-active' : '';
                
                if (isFixed) {
                    html += `<td class="p-2 border-r sticky-col font-bold bg-slate-50 text-slate-600">${val}</td>`;
                } else {
                    // Si mode viewer ou pas les droits : input désactivé
                    const canEdit = checkRights(col);
                    html += `
                        <td class="border-r p-0 ${isHighlighted}">
                            <input class="cell-input font-bold" 
                                   value="${val}" 
                                   ${!canEdit ? 'disabled' : ''}
                                   onchange="saveUpdate('${row.id}', '${col}', this.value)">
                        </td>`;
                }
            });
            html += `</tr>`;
        });
        body.innerHTML = html;
    }

    // --- LOGIQUE DE SÉCURITÉ ---
    function checkRights(column) {
        if (auth.role === 'admin-full') return true;
        if (auth.role === 'admin-hospi') {
            // Liste des colonnes autorisées pour AD
            const hospiCols = ['C Periph', 'C Cogn', 'C sup', 'C Int1', 'C Int2', 'UNV1', 'UNV2', 'USI1', 'USI2'];
            return hospiCols.includes(column);
        }
        return false;
    }

    // --- SAUVEGARDE EN DIRECT SUR SUPABASE ---
    async function saveUpdate(id, column, newValue) {
        const { error } = await _supabase
            .from('planning')
            .update({ [column]: newValue })
            .eq('id', id);

        if (error) {
            alert("Erreur de sauvegarde: " + error.message);
            loadPlanning(); // Recharge pour annuler l'erreur visuelle
        } else {
            // Mise à jour locale de la mémoire pour que le highlight fonctionne sans recharger
            const index = fullData.findIndex(r => r.id == id);
            fullData[index][column] = newValue;
            console.log("Enregistré avec succès");
        }
    }

    // --- LOGIN ---
    function login() {
        const u = document.getElementById('user').value.toUpperCase();
        const p = document.getElementById('pass').value;

        if (u === 'RN' && p === '123') auth = { user: 'RN', role: 'admin-full' };
        else if (u === 'AD' && p === '456') auth = { user: 'AD', role: 'admin-hospi' };
        else return alert("Accès refusé");

        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');
        renderTable();
    }

    // Lancement au démarrage
    window.onload = loadPlanning;
</script>
